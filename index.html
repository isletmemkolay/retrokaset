<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro TV Müzik Kartı</title>
  <meta name="description" content="QR ile açılan sade retro TV müzik sayfası" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0d0a;
      --surface: #18140f;
      --surface-2: #231d16;
      --text: #f6efe6;
      --muted: #cdbda7;
      --line: rgba(255,255,255,.12);
      --accent: #d29a54;
      --accent-2: #8f6535;
      --radius: 22px;
      --shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(210,154,84,.18), transparent 26%), var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(1180px, 100%);
      display: grid;
      gap: 18px;
    }
    .stage {
      position: relative;
      background: #120f0c;
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      aspect-ratio: 16 / 9;
    }
    .scene {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .tv-video {
      position: absolute;
      left: 38.9%;
      top: 36.3%;
      width: 19.3%;
      height: 24.3%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.24);
      background: #000;
    }
    .tv-video iframe,
    .tv-video #player {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      pointer-events: none;
    }
    .scanline::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.04) 0 2px, rgba(0,0,0,0) 2px 4px);
      mix-blend-mode: soft-light;
      pointer-events: none;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .btn {
      min-width: 50px;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.08); }
    .btn.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #140f0a; border-color: transparent; font-weight: 700; }
    .range-wrap {
      flex: 1 1 240px;
      min-width: 180px;
      display: grid;
      gap: 6px;
      padding-inline: 6px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .mini {
      color: var(--muted);
      font-size: 13px;
      padding-inline: 4px;
    }
    @media (max-width: 900px) {
      .tv-video { left: 38.7%; top: 36.2%; width: 19.5%; height: 24.6%; border-radius: 14px; }
    }
    @media (max-width: 640px) {
      body { padding: 10px; }
      .stage { aspect-ratio: 16 / 10.2; }
      .tv-video { left: 38.4%; top: 35.9%; width: 19.9%; height: 25%; border-radius: 10px; }
      .controls { padding: 10px; gap: 10px; }
      .btn { min-width: 46px; height: 46px; border-radius: 14px; }
      .mini { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage scanline" aria-label="Retro TV sahnesi">
      <img class="scene" src="./scene.jpg" alt="Retro televizyonlardan oluşan dekor sahnesi" width="1920" height="1080" loading="eager" />
      <div class="tv-video" aria-label="TV ekranı içindeki video alanı">
        <div id="player"></div>
      </div>
    </section>

    <section class="controls" aria-label="Video kontrol paneli">
      <button class="btn primary" id="playBtn" aria-label="Oynat">▶</button>
      <button class="btn" id="pauseBtn" aria-label="Duraklat">❚❚</button>
      <button class="btn" id="restartBtn" aria-label="Başa sar">↺</button>
      <button class="btn" id="muteBtn" aria-label="Sesi kapat veya aç">🔊</button>
      <div class="range-wrap">
        <div class="meta"><span id="currentTime">00:00</span><span id="duration">00:00</span></div>
        <input type="range" id="seekBar" min="0" max="100" value="0" aria-label="İlerleme çubuğu" />
      </div>
      <div class="range-wrap" style="flex:0 1 180px;">
        <div class="meta"><span>Ses</span><span id="volumeLabel">70%</span></div>
        <input type="range" id="volumeBar" min="0" max="100" value="70" aria-label="Ses seviyesi" />
      </div>
      <div class="mini">QR bu sayfaya gelsin. Video bitince durur; başka videoya geçmez.</div>
    </section>
  </main>

  <script>
    const YOUTUBE_VIDEO_ID = 'Yf3UpljAe4I';
    let player;
    let ready = false;
    let timer = null;
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const muteBtn = document.getElementById('muteBtn');
    const seekBar = document.getElementById('seekBar');
    const volumeBar = document.getElementById('volumeBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const volumeLabel = document.getElementById('volumeLabel');

    function formatTime(sec) {
      const total = Math.max(0, Math.floor(sec || 0));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateUI() {
      if (!ready) return;
      const current = player.getCurrentTime() || 0;
      const duration = player.getDuration() || 0;
      currentTimeEl.textContent = formatTime(current);
      durationEl.textContent = formatTime(duration);
      seekBar.value = duration ? Math.min(100, (current / duration) * 100) : 0;
    }

    function startClock() {
      stopClock();
      timer = setInterval(updateUI, 400);
    }

    function stopClock() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    function playVideo() { if (ready) player.playVideo(); }
    function pauseVideo() { if (ready) player.pauseVideo(); }
    function restartVideo() { if (ready) { player.seekTo(0, true); player.playVideo(); } }
    function toggleMute() {
      if (!ready) return;
      if (player.isMuted()) {
        player.unMute();
        muteBtn.textContent = '🔊';
      } else {
        player.mute();
        muteBtn.textContent = '🔇';
      }
    }

    function loadAPI() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        videoId: YOUTUBE_VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          rel: 0,
          fs: 0,
          modestbranding: 1,
          iv_load_policy: 3,
          playsinline: 1,
          enablejsapi: 1,
          origin: window.location.origin
        },
        events: {
          onReady: () => {
            ready = true;
            player.setVolume(Number(volumeBar.value));
            updateUI();
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.PLAYING) startClock();
            if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
              stopClock();
              updateUI();
            }
            if (event.data === YT.PlayerState.ENDED) {
              player.seekTo(0, true);
              player.pauseVideo();
            }
          }
        }
      });
    };

    playBtn.addEventListener('click', playVideo);
    pauseBtn.addEventListener('click', pauseVideo);
    restartBtn.addEventListener('click', restartVideo);
    muteBtn.addEventListener('click', toggleMute);
    seekBar.addEventListener('input', (e) => {
      if (!ready) return;
      const duration = player.getDuration() || 0;
      player.seekTo((Number(e.target.value) / 100) * duration, true);
      updateUI();
    });
    volumeBar.addEventListener('input', (e) => {
      volumeLabel.textContent = e.target.value + '%';
      if (ready) player.setVolume(Number(e.target.value));
    });

    loadAPI();
  </script>
</body>
</html>
