<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro TV Müzik Kartı</title>
  <meta name="description" content="QR ile açılan retro TV yığını içinde çoklu video deneyimi" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1014;--surface:#131a21;--surface-2:#1b2430;--text:#f3f7fa;--muted:#b5c2cf;--line:rgba(255,255,255,.10);--accent:#d7a45b;--accent-2:#9b6a34;--radius:22px;--shadow:0 24px 70px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(circle at top, rgba(215,164,91,.16), transparent 28%),var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:grid;place-items:center;padding:18px}
    .app{width:min(1220px,100%);display:grid;gap:18px}
    .stage{position:relative;background:#0a0f14;border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);aspect-ratio:1368/768;isolation:isolate}
    .scene{width:100%;height:100%;object-fit:cover;display:block;user-select:none;pointer-events:none}
    .screen{position:absolute;overflow:hidden;background:#000;isolation:isolate;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), inset 0 0 24px rgba(0,0,0,.22), 0 0 8px rgba(102,189,255,.06)}
    .screen .viewport{position:absolute;inset:0;overflow:hidden}
    .screen iframe,.screen .viewport > div{position:absolute;border:0;display:block;pointer-events:none;filter:saturate(1.04) contrast(1.02) brightness(.96)}
    .screen::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%, transparent 56%, rgba(0,0,0,.20) 100%);pointer-events:none;z-index:2}
    .screen::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,.08), transparent 22%, transparent 76%, rgba(0,0,0,.18)),repeating-linear-gradient(to bottom, rgba(255,255,255,.04) 0 2px, transparent 2px 4px);mix-blend-mode:screen;opacity:.30;pointer-events:none;z-index:2}

    .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px;background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .btn{min-width:50px;height:50px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;font-size:18px;transition:transform .18s ease,background .18s ease,border-color .18s ease}
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
    .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#140f0a;border-color:transparent;font-weight:700}
    .range-wrap{flex:1 1 240px;min-width:180px;display:grid;gap:6px;padding-inline:6px}
    .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
    input[type="range"]{width:100%;accent-color:var(--accent);cursor:pointer}
    .mini{color:var(--muted);font-size:13px;padding-inline:4px}
    @media (max-width:640px){body{padding:10px}.controls{padding:10px;gap:10px}.btn{min-width:46px;height:46px;border-radius:14px}.mini{width:100%}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}}
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Retro TV yığını sahnesi">
      <img class="scene" src="./scene.jpg" alt="Retro televizyon yığını görseli" width="1368" height="768" loading="eager" />
    </section>

    <section class="controls" aria-label="Video kontrol paneli">
      <button class="btn primary" id="playBtn" aria-label="Oynat">▶</button>
      <button class="btn" id="pauseBtn" aria-label="Duraklat">❚❚</button>
      <button class="btn" id="restartBtn" aria-label="Başa sar">↺</button>
      <button class="btn" id="muteBtn" aria-label="Sesi kapat veya aç">🔊</button>
      <div class="range-wrap">
        <div class="meta"><span id="currentTime">00:00</span><span id="duration">00:00</span></div>
        <input type="range" id="seekBar" min="0" max="100" value="0" aria-label="İlerleme çubuğu" />
      </div>
      <div class="range-wrap" style="flex:0 1 180px;">
        <div class="meta"><span>Ses</span><span id="volumeLabel">70%</span></div>
        <input type="range" id="volumeBar" min="0" max="100" value="70" aria-label="Ses seviyesi" />
      </div>
      <div class="mini">Tüm ekranlarda aynı video TV içinden oynuyormuş gibi görünür. Video bitince başka videoya geçmez.</div>
    </section>
  </main>

  <script>
    const YOUTUBE_VIDEO_ID = 'Yf3UpljAe4I';
    const BASE_W = 1368;
    const BASE_H = 768;
    const screens = [
      { id: 1, x1: 457, y1: 204, x2: 542, y2: 315, r: 8, scale: 1.32 },
      { id: 2, x1: 461, y1: 319, x2: 546, y2: 427, r: 8, scale: 1.28 },
      { id: 3, x1: 343, y1: 333, x2: 453, y2: 482, r: 10, scale: 1.38 },
      { id: 4, x1: 461, y1: 431, x2: 546, y2: 539, r: 7, scale: 1.28 },
      { id: 5, x1: 344, y1: 490, x2: 454, y2: 648, r: 11, scale: 1.42 },
      { id: 6, x1: 460, y1: 543, x2: 547, y2: 662, r: 8, scale: 1.32 },
      { id: 7, x1: 196, y1: 526, x2: 337, y2: 651, r: 14, scale: 1.54 },
      { id: 8, x1: 329, y1: 663, x2: 454, y2: 850, r: 14, scale: 1.56 },
      { id: 9, x1: 196, y1: 663, x2: 326, y2: 846, r: 14, scale: 1.56 },
      { id: 10, x1: 553, y1: 348, x2: 655, y2: 476, r: 10, scale: 1.38 },
      { id: 11, x1: 554, y1: 486, x2: 672, y2: 655, r: 12, scale: 1.48 },
      { id: 12, x1: 677, y1: 539, x2: 771, y2: 666, r: 10, scale: 1.42 },
      { id: 13, x1: 553, y1: 666, x2: 681, y2: 844, r: 14, scale: 1.56 },
      { id: 14, x1: 686, y1: 672, x2: 791, y2: 848, r: 14, scale: 1.56 }
    ];

    const stage = document.querySelector('.stage');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const muteBtn = document.getElementById('muteBtn');
    const seekBar = document.getElementById('seekBar');
    const volumeBar = document.getElementById('volumeBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const volumeLabel = document.getElementById('volumeLabel');

    const players = [];
    let master = null;
    let readyCount = 0;
    let syncTimer = null;

    function toPercentX(px){ return (px / BASE_W) * 100; }
    function toPercentY(px){ return (px / BASE_H) * 100; }

    function buildScreens(){
      screens.forEach((s, idx) => {
        const el = document.createElement('div');
        el.className = 'screen';
        const width = s.x2 - s.x1;
        const height = s.y2 - s.y1;
        el.style.left = toPercentX(s.x1) + '%';
        el.style.top = toPercentY(s.y1) + '%';
        el.style.width = toPercentX(width) + '%';
        el.style.height = toPercentY(height) + '%';
        el.style.borderRadius = s.r + 'px';

        const viewport = document.createElement('div');
        viewport.className = 'viewport';
        const host = document.createElement('div');
        host.id = 'player' + (idx + 1);

        const extra = ((s.scale - 1) / 2) * 100;
        host.style.left = (-extra) + '%';
        host.style.top = (-extra) + '%';
        host.style.width = (s.scale * 100) + '%';
        host.style.height = (s.scale * 100) + '%';

        viewport.appendChild(host);
        el.appendChild(viewport);
        stage.appendChild(el);
      });
    }

    function formatTime(sec){
      const total = Math.max(0, Math.floor(sec || 0));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function allReady(){ return readyCount === screens.length; }

    function updateUI(){
      if (!master || !allReady()) return;
      const current = master.getCurrentTime() || 0;
      const duration = master.getDuration() || 0;
      currentTimeEl.textContent = formatTime(current);
      durationEl.textContent = formatTime(duration);
      seekBar.value = duration ? Math.min(100, (current / duration) * 100) : 0;
    }

    function syncPlayers(force=false){
      if (!master || !allReady()) return;
      const time = master.getCurrentTime() || 0;
      players.forEach((p, index) => {
        if (index === 0) return;
        const diff = Math.abs((p.getCurrentTime() || 0) - time);
        if (force || diff > 0.35) p.seekTo(time, true);
      });
      updateUI();
    }

    function startSync(){ stopSync(); syncTimer = setInterval(() => syncPlayers(false), 500); }
    function stopSync(){ if (syncTimer) clearInterval(syncTimer); syncTimer = null; }

    function playAll(){
      if (!allReady()) return;
      const time = master.getCurrentTime() || 0;
      players.forEach((p, i) => { if (i !== 0) p.seekTo(time, true); });
      players.forEach(p => p.playVideo());
      startSync();
    }

    function pauseAll(){
      if (!allReady()) return;
      players.forEach(p => p.pauseVideo());
      stopSync();
      syncPlayers(true);
    }

    function restartAll(){
      if (!allReady()) return;
      players.forEach(p => p.seekTo(0, true));
      players.forEach(p => p.playVideo());
      startSync();
    }

    function toggleMute(){
      if (!allReady()) return;
      const muted = master.isMuted();
      players.forEach(p => muted ? p.unMute() : p.mute());
      muteBtn.textContent = muted ? '🔊' : '🔇';
    }

    function setVolume(v){
      volumeLabel.textContent = v + '%';
      if (!allReady()) return;
      players.forEach(p => p.setVolume(Number(v)));
    }

    function createPlayer(elId, index){
      return new YT.Player(elId, {
        videoId: YOUTUBE_VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          rel: 0,
          fs: 0,
          modestbranding: 1,
          iv_load_policy: 3,
          playsinline: 1,
          enablejsapi: 1,
          origin: window.location.origin
        },
        events: {
          onReady: (event) => {
            players[index] = event.target;
            readyCount += 1;
            event.target.setVolume(Number(volumeBar.value));
            if (index !== 0) event.target.mute();
            if (index === 0) master = event.target;
            if (allReady()) updateUI();
          },
          onStateChange: (event) => {
            if (index !== 0 || !master) return;
            if (event.data === YT.PlayerState.PLAYING) startSync();
            if (event.data === YT.PlayerState.PAUSED) {
              stopSync();
              players.forEach((p, i) => { if (i !== 0) p.pauseVideo(); });
              syncPlayers(true);
              updateUI();
            }
            if (event.data === YT.PlayerState.ENDED) {
              stopSync();
              players.forEach(p => { p.seekTo(0, true); p.pauseVideo(); });
              updateUI();
            }
          }
        }
      });
    }

    function loadAPI(){
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function(){
      screens.forEach((_, index) => createPlayer('player' + (index + 1), index));
    };

    buildScreens();
    playBtn.addEventListener('click', playAll);
    pauseBtn.addEventListener('click', pauseAll);
    restartBtn.addEventListener('click', restartAll);
    muteBtn.addEventListener('click', toggleMute);
    seekBar.addEventListener('input', (e) => {
      if (!allReady()) return;
      const duration = master.getDuration() || 0;
      const target = (Number(e.target.value) / 100) * duration;
      players.forEach(p => p.seekTo(target, true));
      updateUI();
    });
    volumeBar.addEventListener('input', (e) => setVolume(e.target.value));
    setInterval(updateUI, 400);
    loadAPI();
  </script>
</body>
</html>
